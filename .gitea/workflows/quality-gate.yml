name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-test-and-build-android:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      CI_MAIN_REF: origin/main
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      GITHUB_BEFORE_SHA: ${{ github.event.before }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Flutter Stable Release
        id: flutter_release
        run: python3 scripts/resolve_flutter_stable.py --output github >> "$GITHUB_OUTPUT"

      - name: Fetch remote refs
        run: git fetch --no-tags origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Detect Preinstalled Java
        id: detect_java
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v java >/dev/null 2>&1; then
            echo "satisfied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          major_version="$(java -version 2>&1 | sed -n 's/.*version "\([0-9][0-9]*\).*/\1/p' | head -n1)"
          if [ "$major_version" = "17" ]; then
            echo "satisfied=true" >> "$GITHUB_OUTPUT"
          else
            echo "satisfied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Preinstalled Flutter
        id: detect_flutter
        shell: bash
        run: |
          set -euo pipefail
          required_version="${{ steps.flutter_release.outputs.version }}"
          if ! command -v flutter >/dev/null 2>&1; then
            echo "satisfied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(flutter --version --machine | python3 -c 'import json, sys; print(json.load(sys.stdin)["frameworkVersion"])')"
          if [ "$current_version" = "$required_version" ]; then
            echo "satisfied=true" >> "$GITHUB_OUTPUT"
          else
            echo "satisfied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.detect_java.outputs.satisfied != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        if: steps.detect_flutter.outputs.satisfied != 'true'
        shell: bash
        run: |
          set -euo pipefail

          temp_root="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
          flutter_root="${temp_root}/flutter-${{ steps.flutter_release.outputs.version }}"
          archive_path="${temp_root}/flutter.tar.xz"

          rm -rf "${flutter_root}" "${archive_path}"
          mkdir -p "${flutter_root}"

          curl -fsSL "${{ steps.flutter_release.outputs.download_url }}" -o "${archive_path}"
          echo "${{ steps.flutter_release.outputs.sha256 }}  ${archive_path}" | sha256sum -c -
          tar -xJf "${archive_path}" -C "${flutter_root}" --strip-components=1
          rm -f "${archive_path}"

          "${flutter_root}/bin/flutter" config --no-analytics
          echo "${flutter_root}/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          echo "Resolved Flutter stable: ${{ steps.flutter_release.outputs.version }}"
          java -version
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Diff-aware policy gates
        run: bash scripts/ci_quality_gate.sh

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
